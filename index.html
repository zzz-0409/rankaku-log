<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b7e34b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="乱獲ログ" />
  <title>乱獲ログ</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="style.css?v=20260710-15" />
</head>
<body>
  <section id="loginScreen" class="loginScreen">
    <form id="loginForm" class="loginCard">
      <p class="eyebrow">Salmon Run</p>
      <h1>乱獲ログ</h1>
      <label class="field">
        <span>アカウント名</span>
        <input id="accountNameInput" type="text" autocomplete="username" maxlength="24" placeholder="例: zzz" required />
      </label>
      <label class="field">
        <span>パスワード</span>
        <input id="accountPinInput" type="password" autocomplete="current-password" minlength="4" maxlength="64" placeholder="4文字以上" required />
      </label>
      <div class="loginActions">
        <button id="loginButton" class="primaryButton" type="submit">ログイン</button>
        <button id="createAccountButton" type="button">新規作成</button>
      </div>
      <p id="loginMessage" class="status">初めてなら新規作成、作成済みならログインしてください。</p>
      <div id="accountList" class="accountList"></div>
      <button id="resetLocalDataButton" class="resetLocalDataButton" type="button">この端末のログイン状態をリセット</button>
    </form>
  </section>

  <div id="appShell" class="appShell" hidden>
    <header class="appHeader">
      <div>
        <p class="eyebrow">Salmon Run</p>
        <h1>乱獲ログ</h1>
      </div>
      <div class="accountBar">
        <span id="activeAccountName" class="accountPill"></span>
        <span id="recordCount" class="recordCount">0件</span>
        <button id="logoutButton" class="logoutIconButton" type="button" aria-label="ログアウト" title="ログアウト">
          <svg viewBox="0 0 64 64" aria-hidden="true" focusable="false">
            <defs>
              <linearGradient id="logoutRing" x1="12" x2="52" y1="8" y2="56">
                <stop offset="0" stop-color="#f7f7f7" />
                <stop offset="0.28" stop-color="#7a7a7a" />
                <stop offset="0.58" stop-color="#ffffff" />
                <stop offset="1" stop-color="#4e4e4e" />
              </linearGradient>
              <radialGradient id="logoutRed" cx="34%" cy="22%" r="78%">
                <stop offset="0" stop-color="#ffd2c8" />
                <stop offset="0.35" stop-color="#ff5a43" />
                <stop offset="1" stop-color="#b31212" />
              </radialGradient>
            </defs>
            <circle cx="32" cy="32" r="30" fill="url(#logoutRing)" />
            <circle cx="32" cy="32" r="24" fill="url(#logoutRed)" />
            <path d="M26 20H16v24h10" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="5" />
            <path d="M28 32h19" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="6" />
            <path d="M44 22l10 10-10 10" fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" stroke-width="6" />
            <path d="M17 13a25 25 0 0 1 35 9" fill="none" stroke="#fff" stroke-linecap="round" stroke-opacity=".45" stroke-width="3" />
          </svg>
        </button>
      </div>
    </header>

    <nav class="viewTabs" aria-label="ページ切り替え">
      <button class="viewTab active" type="button" data-view-target="logView">記録</button>
      <button class="viewTab" type="button" data-view-target="recentView">最近の記録</button>
      <button class="viewTab" type="button" data-view-target="bestView">最高まとめ</button>
    </nav>

    <main class="app">
      <div id="logView" class="view active">
        <section class="panel">
          <div class="sectionTitle">
            <span class="step">1</span>
            <h2>スクショ読取</h2>
          </div>

          <label class="filePicker">
            <input id="imageInput" type="file" accept="image/*" />
            <span>画像を選ぶ</span>
          </label>

          <button id="ocrButton" class="primaryButton" type="button">画像を読み取る</button>
          <p id="status" class="status">画像を選んだら、薄いガイドに合わせて切り取ってください。1番上の自分の行だけ読み取ります。</p>
          <div id="cropEditor" class="cropEditor" hidden>
            <div class="cropFrame">
              <canvas id="cropCanvas"></canvas>
              <div class="cropGuide" aria-hidden="true">
                <div class="guideBox guideSummary">ポイント欄</div>
                <div class="guideBox guideWaves">WAVE欄</div>
                <div class="guideBox guidePlayer">自分の行</div>
              </div>
            </div>
            <div class="cropControls">
              <label>
                <span>拡大</span>
                <input id="cropZoom" type="range" min="100" max="180" value="100" />
              </label>
              <label>
                <span>左右</span>
                <input id="cropX" type="range" min="-100" max="100" value="0" />
              </label>
              <label>
                <span>上下</span>
                <input id="cropY" type="range" min="-100" max="100" value="0" />
              </label>
            </div>
            <button id="applyCropButton" type="button">この形に切り取る</button>
          </div>
          <img id="preview" alt="選択したスクリーンショットのプレビュー" />
        </section>

        <section class="panel">
          <div class="sectionTitle">
            <span class="step">2</span>
            <h2>記録を確認</h2>
          </div>

          <fieldset class="modeField">
            <legend>ウェーブ構成</legend>
            <label>
              <input type="radio" name="waveType" value="dayOnly" checked />
              <span>昼のみ</span>
            </label>
            <label>
              <input type="radio" name="waveType" value="nightAny" />
              <span>夜あり</span>
            </label>
          </fieldset>

          <fieldset class="modeField bossBattleField">
            <legend>オカシラ戦</legend>
            <label>
              <input type="radio" name="bossBattle" value="none" checked />
              <span>なし</span>
            </label>
            <label>
              <input type="radio" name="bossBattle" value="yes" />
              <span>あり</span>
            </label>
          </fieldset>

          <label class="field">
            <span>ステージ</span>
            <select id="stage">
              <option>シェケナダム</option>
              <option>アラマキ砦</option>
              <option>ムニ・エール海洋発電所</option>
              <option>難破船ドン・ブラコ</option>
              <option>すじこジャンクション跡</option>
              <option>トキシラズいぶし工房</option>
              <option>どんぴこ闘技場</option>
            </select>
          </label>

          <div class="numberGrid">
            <div class="field deliveryPair">
              <span>個人納品数/アシスト</span>
              <div class="splitInputs">
                <label>
                  <small>個人</small>
                  <input id="delivery" type="number" inputmode="numeric" min="0" placeholder="0" />
                </label>
                <label>
                  <small>アシスト</small>
                  <input id="assistDelivery" type="number" inputmode="numeric" min="0" placeholder="0" />
                </label>
              </div>
            </div>
            <label class="field">
              <span>合計納品数</span>
              <input id="teamDelivery" type="number" inputmode="numeric" min="0" placeholder="0" />
            </label>
            <label class="field">
              <span>赤イクラ</span>
              <input id="red" type="number" inputmode="numeric" min="0" placeholder="0" />
            </label>
            <label class="field">
              <span>オオモノ</span>
              <input id="boss" type="number" inputmode="numeric" min="0" placeholder="0" />
            </label>
            <label class="field">
              <span>救助</span>
              <input id="rescue" type="number" inputmode="numeric" min="0" placeholder="0" />
            </label>
            <label class="field">
              <span>デス</span>
              <input id="death" type="number" inputmode="numeric" min="0" placeholder="0" />
            </label>
          </div>

          <p class="note">読み取りは正確ではないので保存前に確認してください。</p>
          <button id="saveButton" class="primaryButton" type="button">この記録を保存</button>
        </section>

        <section class="panel">
          <div class="sectionTitle">
            <span class="step">3</span>
            <h2>ステージ平均</h2>
          </div>
          <div id="summary"></div>
        </section>
      </div>

      <div id="recentView" class="view">
        <section class="panel">
          <div class="sectionTitle">
            <span class="step">30</span>
            <h2>直近30戦の平均</h2>
          </div>
          <div id="recentAverage"></div>
        </section>

        <section class="panel">
          <div class="sectionTitle compactTitle">
            <h2>最近の記録</h2>
          </div>
          <div id="recentRecords" class="recentList"></div>
        </section>
      </div>

      <div id="bestView" class="view">
        <section class="panel">
          <div class="sectionTitle">
            <span class="step">★</span>
            <h2>最高まとめ</h2>
          </div>
          <div id="totalSummary"></div>
        </section>

        <section class="panel">
          <div class="sectionTitle compactTitle">
            <h2>昼のみ</h2>
          </div>
          <div id="dayOnlyBest" class="bestList"></div>
        </section>

        <section class="panel">
          <div class="sectionTitle compactTitle">
            <h2>夜あり</h2>
          </div>
          <div id="nightAnyBest" class="bestList"></div>
        </section>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="main.js?v=20260710-18"></script>
</body>
</html>
